name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Validate Python syntax
        run: |
          python -m py_compile backend/app/main.py backend/app/routes/status.py backend/app/routes/simulation.py backend/app/routes/nudge.py backend/app/routes/kpi.py backend/app/routes/health.py backend/tests/test_api_auth.py
      - name: Run backend smoke tests
        run: |
          python -m pytest backend/tests/test_api_auth.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Build frontend
        run: |
          cd frontend
          npm run build
